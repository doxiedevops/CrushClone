// ═══════════════════════════════════════════════════════════════════════════
// Bridge: JS ↔ C++ plugin communication
// ═══════════════════════════════════════════════════════════════════════════
window._paramSetters = {};

function sendToPlugin(id, value) {
  try {
    var f = document.createElement('iframe');
    f.style.display = 'none';
    f.src = 'crushclone://param/' + encodeURIComponent(id) + '/' + value;
    document.body.appendChild(f);
    setTimeout(function() { f.remove(); }, 80);
  } catch(e) {}
}

window.setPluginParam = function(id, value) {
  if (window._paramSetters[id]) {
    window._paramSetters[id](typeof value === 'string' ? parseFloat(value) : value);
  }
};

window.setPluginParamBatch = function(params) {
  for (var id in params) {
    if (window._paramSetters[id]) {
      window._paramSetters[id](params[id]);
    }
  }
};
</script>

/* ── Rotary Knob ───────────────────────────────── */
function Knob({ label, value, onChange, min = 0, max = 1, size = 68 }) {
  const [drag, setDrag] = useState(false);
  const norm   = (value - min) / (max - min);
  const startA = -135, endA = 135;
  const angle  = startA + norm * (endA - startA);
  const r      = size / 2 - 7;
  const cx = size / 2, cy = size / 2;
  const pol = (a, rad) => ({
    x: cx + rad * Math.cos((a - 90) * Math.PI / 180),
    y: cy + rad * Math.sin((a - 90) * Math.PI / 180),
  });
  const ts = pol(startA, r), te = pol(endA, r), tv = pol(angle, r);
  const bigV   = angle - startA > 180 ? 1 : 0;
  const trackD = `M${ts.x} ${ts.y}A${r} ${r} 0 1 1 ${te.x} ${te.y}`;
  const valD   = norm > 0.005 ? `M${ts.x} ${ts.y}A${r} ${r} 0 ${bigV} 1 ${tv.x} ${tv.y}` : null;
  const pEnd   = pol(angle, r * 0.50);
  const pStart = pol(angle, r * 0.14);

  const onDown = useCallback((e) => {
    e.preventDefault(); setDrag(true);
    const st = { y: e.clientY, v: value };
    const mv = (e2) => {
      const d = (st.y - e2.clientY) / 150;
      onChange(Math.min(max, Math.max(min, st.v + d * (max - min))));
    };
    const up = () => { setDrag(false); document.removeEventListener("mousemove", mv); document.removeEventListener("mouseup", up); };
    document.addEventListener("mousemove", mv);
    document.addEventListener("mouseup", up);
  }, [value, min, max, onChange]);

  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:6, userSelect:"none" }}>
      <div style={{ position:"relative", width:size, height:size }}>
        <div style={{
          position:"absolute", inset:-5, borderRadius:"50%",
          background:`radial-gradient(circle, ${T.gGlow} 0%, transparent 72%)`,
          opacity: drag ? 0.6 : 0.15, transition:"opacity 0.3s", pointerEvents:"none",
        }}/>
        <svg width={size} height={size}
          style={{ cursor:"ns-resize", position:"relative", zIndex:1,
            filter: drag ? `drop-shadow(0 0 7px ${T.gGlow})` : "none" }}
          onMouseDown={onDown}>
          <defs>
            <linearGradient id="arc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stopColor={T.gA}/>
              <stop offset="55%" stopColor={T.gB}/>
              <stop offset="100%" stopColor={T.gC} stopOpacity="0.7"/>
            </linearGradient>
            <radialGradient id="sphere" cx="36%" cy="30%" r="64%">
              <stop offset="0%" stopColor={T.knobA}/>
              <stop offset="45%" stopColor={T.knobB}/>
              <stop offset="100%" stopColor={T.knobC}/>
            </radialGradient>
            <radialGradient id="specular" cx="33%" cy="27%" r="36%">
              <stop offset="0%" stopColor="rgba(255,255,255,0.16)"/>
              <stop offset="100%" stopColor="rgba(255,255,255,0)"/>
            </radialGradient>
          </defs>
          <path d={trackD} fill="none" stroke="rgba(200,151,62,0.08)" strokeWidth="2.5" strokeLinecap="round"/>
          {Array.from({ length: 11 }, (_, i) => {
            const a = startA + (i / 10) * (endA - startA);
            const p = pol(a, r + 4);
            const on = i / 10 <= norm;
            return <circle key={i} cx={p.x} cy={p.y} r="1.8" fill={on ? T.gB : T.knobDot} opacity={on ? 0.90 : 0.55}/>;
          })}
          <circle cx={cx} cy={cy} r={r * 0.54} fill="url(#sphere)"/>
          <circle cx={cx} cy={cy} r={r * 0.54} fill="none" stroke={T.gC} strokeWidth="0.8" strokeOpacity="0.30"/>
          <circle cx={cx} cy={cy} r={r * 0.54} fill="url(#specular)"/>
          <line x1={pStart.x} y1={pStart.y} x2={pEnd.x} y2={pEnd.y}
            stroke={T.gA} strokeWidth="2.5" strokeLinecap="round" opacity="0.92"/>
          <circle cx={pEnd.x} cy={pEnd.y} r="2.5" fill={T.gA}
            style={{ filter:`drop-shadow(0 0 4px ${T.gGlow})` }}/>
        </svg>
      </div>

        fontFamily:"'DM Mono', monospace",
        textShadow:`0 0 8px ${T.gGlowSoft}`,
      }}>{label}</span>
    </div>
  );
}

function PatchSelector({ index, setIndex }) {
  const prev = () => setIndex((index - 1 + PRESETS.length) % PRESETS.length);

  const ArrBtn = ({ dir, fn }) => {
    const [hov, setHov] = useState(false);
    return (
      <button onClick={fn} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
        style={{
          background: hov ? `linear-gradient(135deg, ${T.gA} 0%, ${T.gB} 100%)`
            : `linear-gradient(135deg, ${T.gB}DD 0%, ${T.gC}DD 100%)`,
          border:`1px solid ${hov ? T.gA+"88" : T.gC+"88"}`, borderRadius:6,
          color:hov ? "#0C0A14" : "#181208", cursor:"pointer",
          width:26, height:26, display:"flex", alignItems:"center", justifyContent:"center",

        }}>{dir === "l" ? "\u25C2" : "\u25B8"}</button>
    );
  };

  return (
    <div style={{
      display:"flex", alignItems:"center", gap:8,
      background:`linear-gradient(135deg, ${T.cardA}F0 0%, ${T.cardC}F8 100%)`,
      backdropFilter:"blur(18px)", WebkitBackdropFilter:"blur(18px)",
      border:`1px solid ${T.cardBorder}`, borderTop:`1px solid ${T.cardBorderTop}`,
      borderRadius:12, padding:"8px 10px",
      boxShadow:`0 4px 16px rgba(0,0,0,0.55), 0 0 22px ${T.fgGlowSoft}, inset 0 1px 0 rgba(200,165,70,0.07)`,
      position:"relative", overflow:"hidden",
    }}>

        background:"linear-gradient(90deg,transparent,rgba(210,175,80,0.22),transparent)" }}/>
      <span style={{ fontSize:7.5, color:T.txtC, fontWeight:600, letterSpacing:2,
        textTransform:"uppercase", fontFamily:"'DM Mono', monospace", flexShrink:0 }}>Patch</span>
      <ArrBtn dir="l" fn={prev}/>
      <div style={{
        flex:1, background:T.lcdBg, border:`1px solid ${T.lcdBorder}`,
        borderRadius:6, padding:"5px 10px", textAlign:"center",
        boxShadow:`inset 0 2px 5px rgba(0,0,0,0.65), 0 0 14px ${T.lcdGlow}`,

          color:T.lcdText, fontFamily:"'DM Mono', monospace",
          letterSpacing:0.5, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
          textShadow:`0 0 12px ${T.lcdGlow}`,
        }}>{PRESETS[index]}</span>
      </div>
      <ArrBtn dir="r" fn={next}/>
      <button onClick={rand} style={{
        background:`linear-gradient(135deg, ${T.gA} 0%, ${T.gB} 55%, ${T.gC} 100%)`,
        border:`1px solid ${T.gA}55`, borderRadius:6, padding:"5px 11px",
        fontSize:7.5, fontWeight:700, letterSpacing:1.4, color:"#0C0A14",
        cursor:"pointer", textTransform:"uppercase", flexShrink:0,
        transition:"all 0.16s ease",
        boxShadow:`0 0 10px ${T.fgGlowSoft}, 0 2px 5px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,245,195,0.32)`,
        fontFamily:"'DM Mono', monospace", textShadow:"0 1px 0 rgba(255,240,180,0.3)",

/* ══ MAIN ══════════════════════════════════════════ */
function CrushCloneThemeV3() {
  // State with bridge registration
  const [patch,    _setPatch]    = useState(0);
  const [tube,     _setTube]     = useState(0);
  const [mech,     _setMech]     = useState(0);
  const [distOn,   _setDistOn]   = useState(true);
  const [cutoff,   _setCutoff]   = useState(20000);
  const [reso,     _setReso]     = useState(0);
  const [filterOn, _setFilterOn] = useState(false);
  const [compAmt,  _setCompAmt]  = useState(0);
  const [phat,     _setPhat]     = useState(false);
  const [compOn,   _setCompOn]   = useState(true);
  const [masterOn, _setMasterOn] = useState(true);
  const [volume,   _setVolume]   = useState(0);
  const [mix,      _setMix]      = useState(1);

  // Register setters for C++ to call
  useEffect(() => {
    window._paramSetters = {
      tubeAmount:   _setTube,     mechAmount:   _setMech,
      distEnable:   (v) => _setDistOn(v > 0.5),
      filterCutoff: _setCutoff,   filterReso:   _setReso,
      filterEnable: (v) => _setFilterOn(v > 0.5),
      compAmount:   _setCompAmt,
      phatMode:     (v) => _setPhat(v > 0.5),
      compEnable:   (v) => _setCompOn(v > 0.5),
      masterVolume: _setVolume,   dryWet:       _setMix,
      preset:       _setPatch,
    };
    // Signal to C++ that the UI is ready
    sendToPlugin('ready', 0);
  }, []);

  // Bridged setters — update local state AND notify C++
  const setPatch    = (v) => { _setPatch(v);    sendToPlugin('preset', v); };
  const setTube     = (v) => { _setTube(v);     sendToPlugin('tubeAmount', v); };
  const setMech     = (v) => { _setMech(v);     sendToPlugin('mechAmount', v); };
  const setDistOn   = (v) => { _setDistOn(v);   sendToPlugin('distEnable', v ? 1 : 0); };
  const setCutoff   = (v) => { _setCutoff(v);   sendToPlugin('filterCutoff', v); };
  const setReso     = (v) => { _setReso(v);     sendToPlugin('filterReso', v); };
  const setFilterOn = (v) => { _setFilterOn(v); sendToPlugin('filterEnable', v ? 1 : 0); };
  const setCompAmt  = (v) => { _setCompAmt(v);  sendToPlugin('compAmount', v); };
  const setPhat     = (v) => { _setPhat(v);     sendToPlugin('phatMode', v ? 1 : 0); };
  const setCompOn   = (v) => { _setCompOn(v);   sendToPlugin('compEnable', v ? 1 : 0); };
  const setMasterOn = (v) => { _setMasterOn(v); };
  const setVolume   = (v) => { _setVolume(v);   sendToPlugin('masterVolume', v); };
  const setMix      = (v) => { _setMix(v);      sendToPlugin('dryWet', v); };

  return (
    <div style={{ position:"relative", width:452, fontFamily:"'DM Sans', -apple-system, sans-serif" }}>
      <div style={{
        position:"absolute", inset:-20, borderRadius:42,
        background:`radial-gradient(ellipse 88% 72% at 50% 50%, ${T.fgGlowSoft} 0%, transparent 72%)`,
        pointerEvents:"none", zIndex:0,
      }}/>
      <div style={{
        position:"relative", zIndex:1, borderRadius:22, padding:5,
        background:`linear-gradient(148deg, ${T.fgA} 0%, ${T.fgB} 22%, ${T.fgC} 48%, ${T.fgB} 74%, ${T.fgA} 100%)`,
        boxShadow:`0 0 0 1px ${T.fgC}CC, 0 0 28px ${T.fgGlow}, 0 0 55px ${T.fgGlowSoft}, 0 28px 70px rgba(0,0,0,0.80), inset 0 1px 0 ${T.fgA}99, inset 0 -1px 0 ${T.fgC}88`,
      }}>
        {[{ top:2,left:2 },{ top:2,right:2 },{ bottom:2,left:2 },{ bottom:2,right:2 }].map((p,i) => (
          <div key={i} style={{
            position:"absolute", ...p, width:10, height:10, borderRadius:"50%",
            background:`radial-gradient(circle at 35% 30%, ${T.fgA}, ${T.fgC})`,
            boxShadow:`0 0 4px ${T.fgGlow}`, zIndex:2,
          }}/>
        ))}
        <div style={{
          background:`linear-gradient(155deg, ${T.shellA} 0%, ${T.shellB} 45%, ${T.shellC} 100%)`,
          backdropFilter:"blur(28px) saturate(1.45)", WebkitBackdropFilter:"blur(28px) saturate(1.45)",
          borderRadius:18, overflow:"hidden",
          boxShadow:"inset 0 2px 8px rgba(0,0,0,0.55), inset 0 -1px 0 rgba(200,151,62,0.07)",
        }}>
          <div style={{ padding:"20px 20px 22px" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:13, marginBottom:16 }}>
              <CamelLogo size={33}/>
              <div>
                <div style={{ display:"flex", alignItems:"baseline", gap:5 }}>
                  <span style={{ fontSize:15, fontWeight:300, color:T.txtB, letterSpacing:2, fontFamily:"'DM Sans', sans-serif" }}>Crush</span>
                  <span style={{
                    fontSize:26, fontWeight:700, letterSpacing:0.4,
                    background:`linear-gradient(135deg, ${T.gA} 0%, ${T.gB} 60%, ${T.gC} 100%)`,
                    WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", backgroundClip:"text",
                    fontFamily:"'DM Sans', sans-serif", filter:`drop-shadow(0 0 10px ${T.gGlow})`,
                  }}>Clone</span>
                  <span style={{ fontSize:9, fontWeight:400, color:T.txtC, letterSpacing:1.4,
                    fontFamily:"'DM Mono', monospace", marginLeft:2, alignSelf:"flex-end", paddingBottom:4 }}>v3.0</span>
                </div>
                <div style={{ fontSize:7.5, color:T.txtC, letterSpacing:3.5,
                  textTransform:"uppercase", marginTop:1, fontFamily:"'DM Mono', monospace" }}>Multi-effect processor</div>
              </div>
            </div>
            <div style={{ marginBottom:13 }}>
              <PatchSelector index={patch} setIndex={setPatch}/>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <BentoCard title="Distortion" enabled={distOn} onToggle={setDistOn}>
                <Knob label="Tube" value={tube} onChange={setTube} min={0} max={1}/>
                <Knob label="Mech" value={mech} onChange={setMech} min={0} max={1}/>
              </BentoCard>
              <BentoCard title="Filter" enabled={filterOn} onToggle={setFilterOn}>
                <Knob label="Cutoff" value={cutoff} onChange={setCutoff} min={20} max={20000}/>
                <Knob label="Res" value={reso} onChange={setReso} min={0} max={1}/>
              </BentoCard>
              <BentoCard title="Compressor" enabled={compOn} onToggle={setCompOn}>
                <Knob label="Amount" value={compAmt} onChange={setCompAmt} min={0} max={1}/>
                <PhatButton active={phat} onChange={setPhat}/>
              </BentoCard>
              <BentoCard title="Master" enabled={masterOn} onToggle={setMasterOn}>
                <Knob label="Volume" value={volume} onChange={setVolume} min={-24} max={12}/>
                <Knob label="Mix" value={mix} onChange={setMix} min={0} max={1}/>
              </BentoCard>
            </div>
            <div style={{ marginTop:13, display:"flex", justifyContent:"center", alignItems:"center", gap:6 }}>
              {["VST3","·","Apple Silicon","·","ARM64"].map((t,i) => (
                <span key={i} style={{
                  fontSize:7, color:T.txtC, letterSpacing:t==="·"?0:2.2,
                  textTransform:"uppercase", fontFamily:"'DM Mono', monospace", opacity:0.5,
                }}>{t}</span>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CrushCloneThemeV3/>);
</script>
</body>
</html>
